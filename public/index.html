<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Absence Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Bienvenue</h1>
        <form id="upload-form" enctype="multipart/form-data" method="POST" action="/upload">
            <input type="file" id="excel-file" name="excelFile" accept=".xlsx, .xls" required>
            <button type="submit" class="btn">Upload Excel File</button>
        </form>
        <p id="status-message"></p>
    </div>

    <script>
        const form = document.getElementById('upload-form');
        const statusMessage = document.getElementById('status-message');

        form.addEventListener('submit', async (event) => {
            event.preventDefault(); // Prevent page reload
            
            const fileInput = document.getElementById('excel-file');
            const file = fileInput.files[0];

            if (!file) {
                alert('Please select an Excel file.');
                return;
            }

            const formData = new FormData();
            formData.append('excelFile', file);

            try {
                // Use fetch to send the formData
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData,
                });

                // Handle server response
                const result = await response.json();
                if (response.ok) {
                    statusMessage.textContent = `File uploaded successfully: ${result.message}`;
                    statusMessage.style.color = 'green';
                } else {
                    throw new Error(result.error || 'Error uploading file.');
                }
            } catch (error) {
                statusMessage.textContent = `Error: ${error.message}`;
                statusMessage.style.color = 'red';
            }
        });
    </script>
</body>
</html>
